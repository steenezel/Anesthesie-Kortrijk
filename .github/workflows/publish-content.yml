name: Publish Clinical Content
on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Markdown File
        id: create_file
        run: |
          # 1. Haal data op
          BODY="${{ github.event.issue.body }}"
          LABELS="${{ join(github.event.issue.labels.*.name, ' ') }}"
          
          # Functie om tekst tussen ### koppen te extraheren
          extract_field() {
            echo "$BODY" | sed -n "/### $1/,/###/p" | sed '1d;$d' | xargs
          }

          # 2. Extract velden
          # We checken verschillende mogelijke namen voor de titel-kop
          TITLE_FIELD=$(extract_field "Titel")
          [ -z "$TITLE_FIELD" ] && TITLE_FIELD=$(extract_field "Pocus Naam")
          [ -z "$TITLE_FIELD" ] && TITLE_FIELD=$(extract_field "Artikel Titel")
          [ -z "$TITLE_FIELD" ] && TITLE_FIELD="${{ github.event.issue.title }}"
          
          # Verwijder [Prefix] uit de titel voor de schone weergave
          CLEAN_TITLE=$(echo "$TITLE_FIELD" | sed 's/\[.*\]: //g' | xargs)
          
          DISC=$(extract_field "Discipline")
          SUMM=$(extract_field "Samenvatting (Indicaties & Doel)")
          TIPS=$(extract_field "Tips & Tricks")
          PUBMED=$(extract_field "PubMed ID")

          # 3. Bestandsnaam genereren (Slug)
          FILENAME=$(echo "$CLEAN_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g').md

          # 4. DE ROUTING (Gecorrigeerd)
          # We zoeken naar de specifieke woorden in de string van alle labels
          if [[ " $LABELS " =~ " block " ]]; then
            DEST="client/src/content/blocks/$FILENAME"
          elif [[ " $LABELS " =~ " pocus " ]]; then
            DEST="client/src/content/pocus/$FILENAME"
          elif [[ " $LABELS " =~ " journal-club " ]]; then
            DEST="client/src/content/journal-club/$FILENAME"
          else
            # Het is een protocol: check de discipline
            case "${DISC,,}" in # ,, maakt het lowercase voor de check
              "abdominale"|"buitendiensten"|"neurochirurgie"|"nko"|"obstetrie-epidurale"|"orthopedie"|"pijnkliniek"|"reanimatie"|"thorax-vaat"|"urologie")
                DEST="client/src/content/protocols/$DISC/$FILENAME"
                ;;
              *)
                DEST="client/src/content/protocols/Algemeen/$FILENAME"
                ;;
            esac
          fi

          mkdir -p "$(dirname "$DEST")"

          # 5. Schrijf bestand
          {
            echo "---"
            echo "title: \"$CLEAN_TITLE\""
            echo "date: \"$(date +%Y-%m-%d)\""
            echo "author: \"${{ github.event.issue.user.login }}\""
            echo "discipline: \"$DISC\""
            echo "pubmedId: \"$PUBMED\""
            echo "tips: \"$TIPS\""
            echo "summary: \"$SUMM\""
            echo "published: true"
            echo "---"
            echo ""
            echo "$BODY"
          } > "$DEST"
          
          echo "final_path=$DEST" >> $GITHUB_ENV
          
      - name: Commit and Push
        run: |
          git config --global user.name "Clinical Content Bot"
          git config --global user.email "bot@azgroeninge.be"
          git add .
          git diff-index --quiet HEAD || git commit -m "Content Update: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "✅ Succesvol gepubliceerd naar \`$final_path\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

