name: Publish Clinical Content
on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Template Name
        id: get_template
        run: |
          LABELS="${{ join(github.event.issue.labels.*.name, ' ') }}"
          if [[ "$LABELS" == *"block"* ]]; then
            echo "template=new-block.yml" >> $GITHUB_OUTPUT
            echo "type=block" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"pocus"* ]]; then
            echo "template=new-pocus.yml" >> $GITHUB_OUTPUT
            echo "type=pocus" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"journal-club"* ]]; then
            echo "template=new-journal.yml" >> $GITHUB_OUTPUT
            echo "type=journal" >> $GITHUB_OUTPUT
          else
            echo "template=new-protocol.yml" >> $GITHUB_OUTPUT
            echo "type=protocol" >> $GITHUB_OUTPUT
          fi

      - name: Parse Issue Form
        uses: stefanbuck/github-issue-parser@v3
        id: parse
        with:
          template-path: .github/ISSUE_TEMPLATE/${{ steps.get_template.outputs.template }}

      - name: Create Markdown File
        run: |
          # 1. Data ophalen uit de parser (gebruik exact de ID's uit je YAML)
          # We gebruiken een fallback naar de Issue Titel als het formulierveld leeg is
          RAW_TITLE="${{ steps.parse.outputs.title }}"
          if [ -z "$RAW_TITLE" ] || [ "$RAW_TITLE" == "_No response_" ]; then
            RAW_TITLE="${{ github.event.issue.title }}"
          fi
          
          # Schoon de titel op (verwijder [Block]: etc)
          CLEAN_TITLE=$(echo "$RAW_TITLE" | sed 's/\[.*\]: //g' | xargs)
          
          # 2. Bestandsnaam genereren (Slug)
          FILENAME=$(echo "$CLEAN_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | sed 's/[^a-z0-9-]//g').md
          
          # 3. Routing logica
          TYPE="${{ steps.get_template.outputs.type }}"
          
          if [[ "$TYPE" == "block" ]]; then
            DEST="client/src/content/blocks/$FILENAME"
          elif [[ "$TYPE" == "pocus" ]]; then
            DEST="client/src/content/pocus/$FILENAME"
          elif [[ "$TYPE" == "journal" ]]; then
            DEST="client/src/content/journal-club/$FILENAME"
          else
            # Protocol routing met jouw specifieke disciplines
            DISC="${{ steps.parse.outputs.discipline }}"
            # Normaliseer discipline (indien leeg of geen match naar Algemeen)
            case "$DISC" in
              "abdominale"|"buitendiensten"|"neurochirurgie"|"nko"|"obstetrie-epidurale"|"orthopedie"|"pijnkliniek"|"reanimatie"|"thorax-vaat"|"urologie")
                DEST="client/src/content/protocols/$DISC/$FILENAME"
                ;;
              *)
                DEST="client/src/content/protocols/Algemeen/$FILENAME"
                ;;
            esac
          fi

          mkdir -p "$(dirname "$DEST")"

          # 4. Schrijf Markdown met Frontmatter
          # Belangrijk: we mappen hier de velden voor block-detail.tsx (zoals tips, sono_main)
          {
            echo "---"
            echo "title: \"$CLEAN_TITLE\""
            echo "date: \"$(date +%Y-%m-%d)\""
            echo "author: \"${{ github.event.issue.user.login }}\""
            echo "discipline: \"${{ steps.parse.outputs.discipline }}\""
            echo "pubmedId: \"${{ steps.parse.outputs.pubmedId }}\""
            echo "tips: \"${{ steps.parse.outputs.tips }}\""
            echo "summary: \"${{ steps.parse.outputs.summary }}\""
            echo "published: true"
            echo "---"
            echo ""
            echo "${{ github.event.issue.body }}"
          } > "$DEST"
          
          echo "final_path=$DEST" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          git config --global user.name "Clinical Content Bot"
          git config --global user.email "bot@azgroeninge.be"
          git add .
          git diff-index --quiet HEAD || git commit -m "Content Update: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "✅ Gepubliceerd naar \`$final_path\`. De app wordt bijgewerkt."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
